function renderStreamsTable(matchName) {
  const tbody = document.querySelector("tbody");
  tbody.innerHTML = ""; // clear old rows

  const streams = streamsData[matchName] || [];

  if (streams.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:20px;">No streams added yet for this match</td></tr>`;
    return;
  }

  streams.forEach(s => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td data-label="Streamer" class="streamer">${s.streamer}</td>
      <td data-label="Mobile" class="${s.mobile === 'Yes' ? 'mobile-yes' : 'mobile-no'}">${s.mobile}</td>
      <td data-label="Quality" class="${s.quality.includes('HD') ? 'quality-hd' : 'quality-sd'}">${s.quality}</td>
      <td data-label="Ads" class="${s.ads.includes('1') || s.ads.includes('0') ? 'ads-low' : s.ads.includes('2') || s.ads.includes('3') ? 'ads-medium' : 'ads-high'}">${s.ads}</td>
      <td data-label="Language">${s.language}</td>
      <td data-label="Action"><a href="${s.link}" target="_blank" class="watch-btn">Watch</a></td>
    `;
    tbody.appendChild(row);
  });
}
    // === Update title + render correct streams ===
    function updateMatchHeader() {
      const params = new URLSearchParams(window.location.search);
      let matchName = params.get("match");

      const titleEl = document.getElementById("match-title");

      if (!matchName) {
        titleEl.textContent = "Match not found";
        return;
      }

      document.title = matchName + " | StreamYute";
      titleEl.textContent = matchName;

      // Render the right streams for this match
      renderStreamsTable(matchName);
    }

    // Run it
    updateMatchHeader();
    setInterval(updateMatchHeader, 1000); // keeps countdown fresh if you add it later
